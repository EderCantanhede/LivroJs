<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exemplo-1.6</title>
</head>
<body>
    <script>
      //Entrada de dados: ler dois números
      //Processamento: calcular a soma
      //Saída: informar a soma
      const num = Number(prompt("1°Número: "))
      const num2 = Number(prompt("2°Número: "))
      const soma = num + num2
      alert(`Soma é: ${soma}`)
    </script>
</body>
