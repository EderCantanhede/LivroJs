<!DOCTYPE html>
<html lang="pt-br">
<head>

<body>
    <script>
      const num = Number(prompt("Informe um número: "))
      const sucessor = num + 1
      const antecessor = num - 1
      alert(`O número é: ${num}\nSeu sucessor é: ${sucessor}\nSeu antecessor é: ${antecessor}`)
    </script>
</body>
