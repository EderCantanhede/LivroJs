<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício2</title>
</head>
<body>
    <script>
        const valorConta = Number(prompt("Informe o valor da conta: "))
        const numClientes = 3
        const valorPrCliente = valorConta / numClientes
        alert(
            `Valor da conta: R$${valorConta.toFixed(2)}
             Número de Clientes: ${numClientes}
             Valor por cliente: R$${valorPrCliente.toFixed(2)}`
        )
    </script>
</body>
</html>
